<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="form-card">
        <h2>Your Cart 🛒</h2>
        {% if cart %}
        <table>
            <tr>
                <th>Item</th><th>Price</th><th>Qty</th><th>Subtotal</th><th>Actions</th>
            </tr>
            {% for item in cart %}
            <tr>
                <td>{{ item.name }}</td>
                <td>₹{{ item.price }}</td>
                <td>
                    <form method="post">
                        <input type="hidden" name="index" value="{{ loop.index0 }}">
                        <input type="number" name="quantity" value="{{ item.quantity }}" min="1">
                        <button type="submit" name="action" value="update" class="btn small">✔</button>
                    </form>
                </td>
                <td>₹{{ item.price * item.quantity }}</td>
                <td>
                    <form method="post">
                        <input type="hidden" name="index" value="{{ loop.index0 }}">
                        <button type="submit" name="action" value="remove" class="btn small danger">🗑️</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
        <p>Subtotal: ₹{{ subtotal }}</p>
        <p>Delivery: ₹{{ delivery_charge }}</p>
        <h3>Total: ₹{{ total }}</h3>
        <form method="post" action="{{ url_for('confirm') }}">
            <button type="submit" class="btn success">Confirm Order ✅</button>
        </form>
        <form method="post" action="{{ url_for('cancel') }}">
            <button type="submit" class="btn danger">Cancel ❌</button>
        </form>
        {% else %}
        <p>Your cart is empty!</p>
        {% endif %}
    </div>
</body>
</html>
